version: "3.9"

services:
  # Основной ML-сервис
  ml-service:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models    # модели можно обновлять без пересборки образа
    environment:
      - FLASK_ENV=production
    restart: unless-stopped

  # Простой nginx как реверс-прокси перед ML-сервисом.
  # В реальном production nginx принимал бы внешний трафик и передавал
  # его на uWSGI/gunicorn через протокол uwsgi (см. ARCHITECTURE.md).
  # Здесь он служит демонстрацией концепции и позволяет убрать порт 5000
  # из внешнего доступа.
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ml-service
    restart: unless-stopped
